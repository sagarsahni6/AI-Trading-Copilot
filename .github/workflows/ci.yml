# ============================================
# AI Trading Copilot — CI/CD Pipeline
# ============================================

name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ---- Backend Tests ----
  backend-test:
    name: Backend Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Lint with Ruff
        run: ruff check app/ tests/

      - name: Type check with MyPy
        run: mypy app/ --ignore-missing-imports

      - name: Run tests
        run: pytest tests/ -v --tb=short

  # ---- Extension Build ----
  extension-build:
    name: Extension Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: extension

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: extension/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Type check
        run: pnpm tsc --noEmit

      - name: Build extension
        run: pnpm build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: extension-build
          path: extension/dist/
          retention-days: 7

  # ---- Docker Build ----
  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [backend-test, extension-build]

    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -t ai-trading-copilot-backend ./backend

      - name: Verify image
        run: docker run --rm ai-trading-copilot-backend python -c "from app.main import app; print('✓ Import OK')"
